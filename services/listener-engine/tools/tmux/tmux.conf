# ListenerEngine tmux configuration (dark, high contrast)

# -------- General --------
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g history-limit 20000
set -sg escape-time 0

# -------- Status Bar --------
set -g status-position bottom
set -g status-bg colour234
set -g status-fg colour250
set -g status-interval 5
set -g status-left-length 60
set -g status-right-length 120

set -g status-left " #[bold]#S #[default]"
set -g status-right "#[fg=colour244]%Y-%m-%d #[fg=colour244]%H:%M #[fg=colour045]CPU:#{cpu_percentage} "

# -------- Pane Borders --------
set -g pane-border-style fg=colour240
set -g pane-active-border-style fg=colour051

# -------- Window / Pane titles --------
setw -g automatic-rename off
setw -g allow-rename off

# Enhanced pane borders with titles at top
set -g pane-border-status top
set -g pane-border-format "#[fg=colour45,bold] #{pane_index} │ #{pane_title} #[fg=default]"

# -------- Colors (Nord-ish) --------
set -g message-bg colour237
set -g message-fg colour252
set -g mode-bg colour037
set -g mode-fg colour234

# -------- Plugins (TPM) --------
# Requires TPM installed at ~/.tmux/plugins/tpm
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-cpu'
# set -g @plugin 'tmux-plugins/tmux-resurrect'

# Initialize TPM
run '~/.tmux/plugins/tpm/tpm'


